<!DOCTYPE html>
<html>
<head>
<title>Painel Admin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">

<h1>Painel Admin</h1>

<button onclick="criar()">Gerar Código VIP</button>

<div id="lista"></div>

</div>

<script src="codes.js"></script>

<script>

function criar(){

let codigo = gerarCodigoVIP();

mostrar();

alert("Código criado: " + codigo);
}

function mostrar(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

for(let c in codigosVIP){

let status = codigosVIP[c].usado ? "USADO" : "ATIVO";

lista.innerHTML += `<p>${c} - ${status}</p>`;

}

}

mostrar();

</script>

</body>
</html>
