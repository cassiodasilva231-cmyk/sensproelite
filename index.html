<!DOCTYPE html>
<html>
<head>
<title>Sens Pro Elite</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
margin:5px;
}

.vip{
background:gold;
}

.normal{
background:#334155;
color:white;
}
</style>
</head>

<body>

<h1>SENS PRO ELITE</h1>

<div id="areaVIP" style="display:none;">
<h2>Funções VIP</h2>

<p>Celular detectado automaticamente</p>

<p id="celular"></p>

<button class="vip">Gerar Sensibilidade</button>

</div>

<div id="bloqueado">

<h2>Área VIP bloqueada</h2>

<a href="vip.html">
<button class="normal">Ativar VIP</button>
</a>

</div>

<script>

let vip = localStorage.getItem("vipAtivo");

if(vip == "true"){
document.getElementById("areaVIP").style.display="block";
document.getElementById("bloqueado").style.display="none";
}

let celular = navigator.userAgent;

if(celular.includes("Samsung")){
document.getElementById("celular").innerText="Samsung detectado";
}else if(celular.includes("Xiaomi")){
document.getElementById("celular").innerText="Xiaomi detectado";
}else{
document.getElementById("celular").innerText="Outro celular";
}

</script>

</body>
</html>
