<!DOCTYPE html>
<html>
<head>
<title>Sensi App</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1e1e1e;
margin:20px;
padding:20px;
border-radius:12px;
}

.vip{
color:gold;
font-weight:bold;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Sensi Pro</h1>

<div class="card">
<h2>Sensibilidade</h2>

<p>Geral: <span id="geral"></span></p>
<p>Ponto vermelho: <span id="red"></span></p>
<p>Mira 2x: <span id="m2"></span></p>
<p>Mira 4x: <span id="m4"></span></p>
<p>AWM: <span id="awm"></span></p>
<p>Olhadinha: <span id="olho"></span></p>

</div>

<div class="card vip" id="vipArea" style="display:none;">
<h2>Funções VIP desbloqueadas</h2>
<p>Sensibilidade otimizada para seu celular</p>
</div>

<br>

<button onclick="window.location.href='vip.html'">
Ativar VIP
</button>

<script>

function detectarCelular(){
let largura = window.innerWidth;

if(largura < 400){
return "fraco";
}
else if(largura < 500){
return "medio";
}
else{
return "forte";
}
}

function gerarSensi(){

let tipo = detectarCelular();

let geral = Math.floor(Math.random()*200);
let red = Math.floor(Math.random()*200);
let m2 = Math.floor(Math.random()*200);
let m4 = Math.floor(Math.random()*200);
let awm = Math.floor(Math.random()*200);
let olho = Math.floor(Math.random()*200);

if(tipo === "fraco"){
geral -= 20;
red -= 20;
}

if(tipo === "medio"){
geral += 5;
}

if(tipo === "forte"){
geral += 15;
}

geral = Math.min(200, Math.max(0, geral));

document.getElementById("geral").innerText = geral;
document.getElementById("red").innerText = red;
document.getElementById("m2").innerText = m2;
document.getElementById("m4").innerText = m4;
document.getElementById("awm").innerText = awm;
document.getElementById("olho").innerText = olho;

}

gerarSensi();

if(localStorage.getItem("vipAtivo") === "true"){
document.getElementById("vipArea").style.display = "block";
}

</script>

</body>
</html>
