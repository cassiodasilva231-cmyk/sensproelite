<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial;">

<h1>Painel Admin</h1>

<button onclick="gerarCodigo()">Gerar Código VIP</button>

<div id="lista"></div>

<script src="codes.js"></script>

<script>
function gerarCodigo(){
let codigo = "VIP-" + Math.random().toString(36).substring(2,8).toUpperCase();

codigosVIP[codigo] = {
usado:false
};

salvarCodigos();
mostrarCodigos();
}

function mostrarCodigos(){
let lista = document.getElementById("lista");
lista.innerHTML = "";

for(let codigo in codigosVIP){
let status = codigosVIP[codigo].usado ? "USADO" : "DISPONÍVEL";
lista.innerHTML += `<p>${codigo} - ${status}</p>`;
}
}

mostrarCodigos();
</script>

</body>
</html>
