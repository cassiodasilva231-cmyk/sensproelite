<!DOCTYPE html>
<html>
<head>
<title>VIP Mensal</title>
</head>

<body style="background:#020617;color:white;text-align:center;font-family:Arial;">

<h1>VIP MENSAL</h1>

<p>Preço: R$10 / mês</p>

<button onclick="pagar()">Pagar com Pix</button>

<br><br>

<input id="codigoVIP" placeholder="Código VIP">
<button onclick="ativar()">Ativar</button>

<p id="msg"></p>

<script src="codes.js"></script>

<script>

async function pagar(){

let res = await fetch("/.netlify/functions/criar-pagamento");
let data = await res.json();

window.open(data.pix);

}

function ativar(){

let codigo = document.getElementById("codigoVIP").value;

if(codigosVIP[codigo] && !codigosVIP[codigo].usado){

codigosVIP[codigo].usado = true;
salvarCodigos();

localStorage.setItem("vipAtivo", "true");

document.getElementById("msg").innerText="VIP ativado";

setTimeout(()=>{
location.href="index.html";
},1000);

}else{
document.getElementById("msg").innerText="Código inválido";
}

}

</script>

</body>
</html>
