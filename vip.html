<!DOCTYPE html>
<html>
<head>
<title>Ativar VIP</title>

<style>
body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

.box{
margin-top:120px;
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
font-size:18px;
background:gold;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>Área VIP</h1>

<p>Digite seu código VIP</p>

<input id="codigoVIP" placeholder="Código VIP">

<br>

<button onclick="verificarVIP()">Ativar</button>

<p id="msg"></p>

</div>

<script src="codes.js"></script>

<script>
function verificarVIP(){

let codigo = document.getElementById("codigoVIP").value;

if(codigosVIP[codigo] && !codigosVIP[codigo].usado){

codigosVIP[codigo].usado = true;
salvarCodigos();

localStorage.setItem("vipAtivo","true");

document.getElementById("msg").innerText="VIP ativado!";

setTimeout(()=>{
window.location.href="index.html";
},1200);

}else{
document.getElementById("msg").innerText="Código inválido ou já usado";
}

}
</script>

</body>
</html>
